<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaLangrova — Administrace</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: #121216;
            --bg-surface-elevated: #1a1a22;
            --accent: #d68c3f;
            --accent-hover: #f1a95c;
            --text-main: #f3f3f6;
            --text-muted: #8e8e9f;
            --border: #22222a;
            --danger: #e65050;
            --success: #50e690;
            --font: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* ── AUTH CONTAINER ── */
        .auth-container {
            margin-top: 15vh;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-container h1 {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .auth-container p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: var(--font);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(214, 140, 63, 0.2);
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: var(--bg-surface-elevated);
            color: var(--text-main);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #ff6464;
        }

        .feedback {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--danger);
        }

        .feedback.success {
            color: var(--success);
        }

        /* ── DASHBOARD CONTAINER ── */
        .dashboard {
            display: none;
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
        }

        header.dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        header.dashboard-header h1 {
            font-size: 2rem;
            font-weight: 900;
        }

        header.dashboard-header button {
            width: auto;
            padding: 8px 16px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 60px;
        }

        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .product-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
        }

        .product-img-preview {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--bg-base);
            margin-bottom: 15px;
        }

        .drag-drop-zone {
            border: 2px dashed var(--border);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }

        .drag-drop-zone:hover {
            border-color: var(--accent);
            background: rgba(214, 140, 63, 0.05);
        }

        .drag-drop-zone p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Blog Section */
        .blog-section {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .blog-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .blog-item {
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .blog-item {
                flex-direction: row;
                align-items: center;
            }
        }

        .blog-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .blog-item-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--bg-base);
        }

        .blog-item-title {
            font-weight: 600;
        }

        .blog-item-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .blog-actions {
            display: flex;
            gap: 10px;
        }

        .blog-actions button {
            padding: 8px 16px;
            font-size: 0.85rem;
            width: auto;
        }

        /* Modal / Form overlay */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-modal:hover {
            color: var(--text-main);
        }

        /* Toggle switch component */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .switch-label {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-surface-elevated);
            border: 1px solid var(--border);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-muted);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(214, 140, 63, 0.2);
            border-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: var(--accent);
        }
    </style>
</head>
<body>

    <!-- ── AUTHENTICATION ── -->
    <div id="auth-panel" class="auth-container">
        <h1>Administrace</h1>
        <p>Zadejte heslo pro správu webu EvaLangrova</p>
        <form id="login-form">
            <div class="form-group">
                <label for="password">Heslo</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Přihlásit se</button>
            <div id="login-feedback" class="feedback"></div>
        </form>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard-panel" class="dashboard">
        <header class="dashboard-header">
            <div>
                <h1>Administrace</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Správa produktů a blogu</p>
            </div>
            <button id="logout-btn" class="btn btn-secondary">Odhlásit se</button>
        </header>

        <!-- Products Section -->
        <section>
            <h2 class="section-title">Produkty</h2>
            <div id="products-list-container" class="products-grid">
                <!-- Dynamically filled with products -->
            </div>
        </section>

        <!-- Blog Section -->
        <section class="blog-section">
            <h2 class="section-title">
                Studio Journal (Blog)
                <button id="add-post-btn" class="btn" style="width: auto; padding: 6px 16px; font-size: 0.85rem;">Napsat nový článek</button>
            </h2>
            <div id="blog-list-container" class="blog-list">
                <!-- Dynamically filled with posts -->
            </div>
        </section>
    </div>

    <!-- ── BLOG POST MODAL ── -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="close-post-modal">×</button>
            <h2 id="modal-title" style="margin-bottom: 20px; font-weight: 700;">Napsat nový článek</h2>
            <form id="post-form">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label for="post-title">Nadpis</label>
                    <input type="text" id="post-title" required placeholder="Jak vyfotit...">
                </div>
                
                <div class="form-group">
                    <label>Úvodní fotka</label>
                    <div id="post-drag-zone" class="drag-drop-zone">
                        <p>Přetáhněte sem obrázek nebo klikněte pro výběr</p>
                        <input type="file" id="post-file-input" accept="image/*" style="display:none">
                        <span id="post-img-path" style="font-size: 0.8rem; color: var(--accent); margin-top: 5px; display: block;"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="post-text">Obsah článku (text)</label>
                    <textarea id="post-text" rows="8" required placeholder="Napište obsah článku..."></textarea>
                </div>

                <button type="submit" class="btn" id="save-post-submit">Uložit článek</button>
                <div id="post-feedback" class="feedback"></div>
            </form>
        </div>
    </div>

    <script>
        let authToken = '';

        // UI Panels
        const authPanel = document.getElementById('auth-panel');
        const dashboardPanel = document.getElementById('dashboard-panel');
        const loginForm = document.getElementById('login-form');
        const loginFeedback = document.getElementById('login-feedback');
        const logoutBtn = document.getElementById('logout-btn');

        // Check if token exists in localStorage
        const savedToken = localStorage.getItem('eva_admin_token');
        if (savedToken) {
            authToken = savedToken;
            verifyToken();
        }

        // Login Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    authToken = data.token;
                    localStorage.setItem('eva_admin_token', authToken);
                    showDashboard();
                } else {
                    loginFeedback.textContent = data.error || 'Přihlášení selhalo';
                }
            } catch (err) {
                loginFeedback.textContent = 'Chyba připojení k serveru';
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            authToken = '';
            localStorage.removeItem('eva_admin_token');
            authPanel.style.display = 'block';
            dashboardPanel.style.display = 'none';
        });

        async function verifyToken() {
            try {
                const res = await fetch('/api/admin?action=status', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (res.ok) {
                    showDashboard();
                } else {
                    localStorage.removeItem('eva_admin_token');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function showDashboard() {
            authPanel.style.display = 'none';
            dashboardPanel.style.display = 'block';
            loadProducts();
            loadBlogPosts();
        }

        // ── PRODUCTS MANAGEMENT ──
        async function loadProducts() {
            try {
                const res = await fetch('/products.json');
                const products = await res.json();
                const container = document.getElementById('products-list-container');
                container.innerHTML = '';

                products.forEach(p => {
                    const inStock = p.inStock !== false; // Default true
                    const priceVal = parseInt(p.price.replace(/[^0-9]/g, ''), 10) || 990;

                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${p.localImg || p.imgUrl}" class="product-img-preview" id="preview-img-${p.id}">
                        
                        <div class="drag-drop-zone" id="drag-zone-${p.id}">
                            <p>Drag & drop novou fotku</p>
                            <input type="file" id="file-${p.id}" accept="image/*" style="display:none">
                        </div>

                        <h3 style="margin-bottom: 15px; font-weight: 600;">${p.name}</h3>

                        <div class="form-group">
                            <label>Cena (Kč)</label>
                            <input type="number" id="price-${p.id}" value="${priceVal}" required>
                        </div>

                        <div class="switch-container">
                            <span class="switch-label">Skladem</span>
                            <label class="switch">
                                <input type="checkbox" id="stock-${p.id}" ${inStock ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label>Popis</label>
                            <textarea id="desc-${p.id}" rows="4">${p.description || ''}</textarea>
                        </div>

                        <button class="btn" onclick="updateProduct('${p.id}')">Uložit produkt</button>
                        <div id="feedback-${p.id}" class="feedback"></div>
                    `;

                    container.appendChild(card);

                    // Setup Image Upload handlers for each product card
                    setupImageUpload(p.id);
                });
            } catch (err) {
                console.error('Error loading products:', err);
            }
        }

        function setupImageUpload(productId) {
            const zone = document.getElementById(`drag-zone-${productId}`);
            const fileInput = document.getElementById(`file-${productId}`);
            const preview = document.getElementById(`preview-img-${productId}`);

            zone.addEventListener('click', () => fileInput.click());

            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.style.borderColor = 'var(--accent)';
            });

            zone.addEventListener('dragleave', () => {
                zone.style.borderColor = 'var(--border)';
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.style.borderColor = 'var(--border)';
                if (e.dataTransfer.files.length) {
                    handleFile(e.dataTransfer.files[0], productId);
                }
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) {
                    handleFile(fileInput.files[0], productId);
                }
            });
        }

        async function handleFile(file, productId) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result;

                try {
                    const res = await fetch('/api/admin?action=upload-image', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify({
                            filename: file.name,
                            fileData: base64
                        })
                    });

                    const data = await res.json();
                    if (res.ok && data.success) {
                        const preview = document.getElementById(`preview-img-${productId}`);
                        preview.src = data.imageUrl;
                        preview.dataset.uploadedUrl = data.imageUrl;
                    } else {
                        alert(data.error || 'Nahrávání selhalo');
                    }
                } catch (err) {
                    alert('Chyba nahrávání');
                }
            };
        }

        async function updateProduct(productId) {
            const price = document.getElementById(`price-${productId}`).value;
            const inStock = document.getElementById(`stock-${productId}`).checked;
            const description = document.getElementById(`desc-${productId}`).value;
            const preview = document.getElementById(`preview-img-${productId}`);
            const image = preview.dataset.uploadedUrl || '';
            const feedback = document.getElementById(`feedback-${productId}`);

            feedback.textContent = '';
            feedback.className = 'feedback';

            try {
                const res = await fetch('/api/admin?action=update-product', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        id: productId,
                        price,
                        inStock,
                        description,
                        image
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    feedback.className = 'feedback success';
                    feedback.textContent = 'Uloženo!';
                } else {
                    feedback.textContent = data.error || 'Aktualizace selhala';
                }
            } catch (err) {
                feedback.textContent = 'Chyba serveru';
            }
        }

        // ── BLOG MANAGEMENT ──
        let blogPosts = [];

        async function loadBlogPosts() {
            try {
                const res = await fetch('/api/blog');
                blogPosts = await res.json();
                const container = document.getElementById('blog-list-container');
                container.innerHTML = '';

                if (blogPosts.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-muted);">Žádné články k zobrazení.</p>';
                    return;
                }

                blogPosts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'blog-item';
                    item.innerHTML = `
                        <div class="blog-item-info">
                            <img src="${post.image}" class="blog-item-img">
                            <div>
                                <div class="blog-item-title">${post.title}</div>
                                <div class="blog-item-meta">${post.date}</div>
                            </div>
                        </div>
                        <div class="blog-actions">
                            <button class="btn btn-secondary" onclick="editPost('${post.id}')">Upravit</button>
                            <button class="btn btn-danger" onclick="deletePost('${post.id}')">Smazat</button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Add Post Modal trigger
        const postModal = document.getElementById('post-modal');
        const addPostBtn = document.getElementById('add-post-btn');
        const closePostModal = document.getElementById('close-post-modal');
        const postForm = document.getElementById('post-form');
        const postFeedback = document.getElementById('post-feedback');

        addPostBtn.addEventListener('click', () => {
            document.getElementById('post-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-text').value = '';
            document.getElementById('post-img-path').textContent = '';
            delete document.getElementById('post-img-path').dataset.url;
            document.getElementById('modal-title').textContent = 'Napsat nový článek';
            postFeedback.textContent = '';
            postModal.style.display = 'flex';
        });

        closePostModal.addEventListener('click', () => {
            postModal.style.display = 'none';
        });

        // Setup blog image upload
        const postDragZone = document.getElementById('post-drag-zone');
        const postFileInput = document.getElementById('post-file-input');

        postDragZone.addEventListener('click', () => postFileInput.click());

        postDragZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            postDragZone.style.borderColor = 'var(--accent)';
        });
        postDragZone.addEventListener('dragleave', () => {
            postDragZone.style.borderColor = 'var(--border)';
        });
        postDragZone.addEventListener('drop', (e) => {
            e.preventDefault();
            postDragZone.style.borderColor = 'var(--border)';
            if (e.dataTransfer.files.length) {
                uploadBlogImage(e.dataTransfer.files[0]);
            }
        });
        postFileInput.addEventListener('change', () => {
            if (postFileInput.files.length) {
                uploadBlogImage(postFileInput.files[0]);
            }
        });

        async function uploadBlogImage(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    const res = await fetch('/api/admin?action=upload-image', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify({
                            filename: file.name,
                            fileData: reader.result
                        })
                    });
                    const data = await res.json();
                    if (res.ok && data.success) {
                        const pathEl = document.getElementById('post-img-path');
                        pathEl.textContent = `Nahráno: ${data.imageUrl}`;
                        pathEl.dataset.url = data.imageUrl;
                    } else {
                        alert(data.error);
                    }
                } catch (e) {
                    alert('Chyba nahrávání');
                }
            };
        }

        // Save post handler
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('post-id').value;
            const title = document.getElementById('post-title').value;
            const text = document.getElementById('post-text').value;
            const image = document.getElementById('post-img-path').dataset.url || '';

            postFeedback.textContent = '';
            postFeedback.className = 'feedback';

            try {
                const res = await fetch('/api/admin?action=save-post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ id, title, text, image })
                });

                const data = await res.json();
                if (res.ok) {
                    postModal.style.display = 'none';
                    loadBlogPosts();
                } else {
                    postFeedback.textContent = data.error || 'Chyba uložení';
                }
            } catch (err) {
                postFeedback.textContent = 'Chyba serveru';
            }
        });

        function editPost(id) {
            const post = blogPosts.find(p => p.id === id);
            if (!post) return;

            document.getElementById('post-id').value = post.id;
            document.getElementById('post-title').value = post.title;
            document.getElementById('post-text').value = post.text;
            const pathEl = document.getElementById('post-img-path');
            pathEl.textContent = `Aktuální: ${post.image}`;
            pathEl.dataset.url = post.image;

            document.getElementById('modal-title').textContent = 'Upravit článek';
            postFeedback.textContent = '';
            postModal.style.display = 'flex';
        }

        async function deletePost(id) {
            if (!confirm('Opravdu chcete tento článek smazat?')) return;

            try {
                const res = await fetch('/api/admin?action=delete-post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ id })
                });

                if (res.ok) {
                    loadBlogPosts();
                } else {
                    const data = await res.json();
                    alert(data.error || 'Smazání se nezdařilo');
                }
            } catch (err) {
                alert('Chyba serveru');
            }
        }
    </script>
</body>
</html>
